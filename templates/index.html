<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Q&A Chatbot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 20px 24px;
        }

        .header h1 {
            font-size: 1.4rem;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 4px;
        }

        .upload-section {
            padding: 16px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upload-section input[type="file"] {
            flex: 1;
            font-size: 0.85rem;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        .status {
            padding: 8px 24px;
            font-size: 0.82rem;
            min-height: 32px;
        }

        .status.success {
            color: #16a34a;
        }

        .status.error {
            color: #dc2626;
        }

        .status.info {
            color: #2563eb;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .user .bubble {
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 3px;
        }

        .assistant .bubble {
            background: #f3f4f6;
            color: #111;
            border-bottom-left-radius: 3px;
        }

        .label {
            font-size: 0.72rem;
            color: #9ca3af;
            margin-bottom: 3px;
        }

        .input-row {
            padding: 14px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .input-row input:focus {
            border-color: #4f46e5;
        }

        .thinking {
            font-size: 0.82rem;
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF Q&A Chatbot</h1>
            <p>Upload a PDF and ask questions about it</p>
        </div>
        <div class="upload-section">
            <input type="file" id="pdfInput" accept=".pdf" />
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadPDF()">Upload</button>
        </div>
        <div class="status" id="status"></div>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-row">
            <input type="text" id="questionInput" placeholder="Ask a question about your PDF..."
                onkeydown="if(event.key==='Enter') askQuestion()" disabled />
            <button class="btn btn-primary" id="askBtn" onclick="askQuestion()" disabled>Send</button>
        </div>
    </div>
    <script>
        function setStatus(msg, type = "info") {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.className = `status ${type}`;
        }
        function addMessage(role, text) {
            const chatBox = document.getElementById("chatBox");
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;
            wrapper.innerHTML = `
      <div class="label">${role === "user" ? "You" : "Assistant"}</div>
      <div class="bubble">${text}</div>
    `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return wrapper;
        }
        async function uploadPDF() {
            const fileInput = document.getElementById("pdfInput");
            const file = fileInput.files[0];
            if (!file) { setStatus("Please select a PDF file.", "error"); return; }
            const uploadBtn = document.getElementById("uploadBtn");
            uploadBtn.disabled = true;
            setStatus("Reading and indexing your PDF...", "info");
            const formData = new FormData();
            formData.append("file", file);
            try {
                const res = await fetch("/upload", { method: "POST", body: formData });
                const data = await res.json();
                if (!res.ok) {
                    setStatus(data.error, "error");
                } else {
                    setStatus(data.message, "success");
                    document.getElementById("questionInput").disabled = false;
                    document.getElementById("askBtn").disabled = false;
                    document.getElementById("chatBox").innerHTML = "";
                }
            } catch (e) {
                setStatus("Upload failed. Please try again.", "error");
            }
            uploadBtn.disabled = false;
        }
        async function askQuestion() {
            const input = document.getElementById("questionInput");
            const question = input.value.trim();
            if (!question) return;
            input.value = "";
            addMessage("user", question);
            const thinking = addMessage("assistant", "<span class='thinking'>Thinking...</span>");
            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                thinking.querySelector(".bubble").textContent = data.answer || data.error;
            } catch (e) {
                thinking.querySelector(".bubble").textContent = "Something went wrong.";
            }
        }
    </script>
</body>

</html>
